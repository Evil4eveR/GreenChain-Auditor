mirror_from_github:
  image: alpine:latest
  before_script:
    - apk add --no-cache git
  script:
    - git config --global user.email "ymarmoud@gmail.com"
    - git config --global user.name "Evil4eveR"
    - git clone --mirror $CI_REPOSITORY_URL local_mirror
    - cd local_mirror
    - git remote set-url origin $CI_REPOSITORY_URL
    - git remote add github https://github.com/Evil4eveR/GreenChain-Auditor.git
    - git fetch github
    - git push --mirror origin
  only:
    - schedules
